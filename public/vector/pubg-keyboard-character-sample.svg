<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Helmeted Keyboard Sticker Character - Vector Sample</title>
  <desc id="desc">A sticker-style vector character wearing a gold gaming helmet, white shirt, black tie, red scarf, and giving a thumbs up.</desc>
  <defs>
    <linearGradient id="helmetGold" x1="145" y1="60" x2="320" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff36b"/>
      <stop offset=".2" stop-color="#d8a70d"/>
      <stop offset=".56" stop-color="#7c4f05"/>
      <stop offset="1" stop-color="#f0c11e"/>
    </linearGradient>
    <linearGradient id="shirtShade" x1="95" y1="240" x2="360" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#cbdde5"/>
    </linearGradient>
    <linearGradient id="tieRed" x1="226" y1="238" x2="294" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff386d"/>
      <stop offset=".55" stop-color="#d91450"/>
      <stop offset="1" stop-color="#8e0d35"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <style>
      .ink{stroke:#050505;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .detail{stroke:#050505;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .fine{stroke:#050505;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .glow-lime{fill:none;stroke:#8cc83e;stroke-width:31;stroke-linecap:round;stroke-linejoin:round}
      .glow-yellow{fill:none;stroke:#f1e51d;stroke-width:20;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

